<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 编辑器</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部工具栏 */
        .header {
            background: #2d2d2d;
            color: white;
            padding: 0 20px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
        }

        .toolbar {
            display: flex;
            gap: 5px;
        }

        .toolbar button {
            background: transparent;
            border: none;
            color: #ccc;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .toolbar button:hover {
            background: #444;
            color: white;
        }

        .toolbar button i {
            font-style: normal;
            font-weight: bold;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .mode-switch {
            display: flex;
            background: #1a1a1a;
            border-radius: 6px;
            padding: 3px;
        }

        .mode-switch button {
            background: transparent;
            border: none;
            color: #999;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: all 0.2s;
        }

        .mode-switch button.active {
            background: #444;
            color: white;
        }

        .action-btn {
            background: #4a9eff;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #3a8eef;
        }

        /* 主编辑区 */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-right: 1px solid #e0e0e0;
        }

        .pane-header {
            background: #f8f8f8;
            padding: 8px 15px;
            font-size: 12px;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #editor {
            flex: 1;
            width: 100%;
            padding: 20px;
            border: none;
            outline: none;
            font-size: 15px;
            line-height: 1.8;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            resize: none;
            background: white;
        }

        .preview-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        #preview {
            flex: 1;
            padding: 20px 30px;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.8;
            color: #333;
        }

        /* Markdown 预览样式 */
        #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #24292e;
        }

        #preview h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        #preview h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        #preview h3 { font-size: 1.25em; }
        #preview h4 { font-size: 1em; }
        #preview h5 { font-size: 0.875em; }
        #preview h6 { font-size: 0.85em; color: #6a737d; }

        #preview p {
            margin-bottom: 16px;
        }

        #preview a {
            color: #0366d6;
            text-decoration: none;
        }

        #preview a:hover {
            text-decoration: underline;
        }

        #preview code {
            background: rgba(27, 31, 35, 0.05);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 85%;
        }

        #preview pre {
            background: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        #preview pre code {
            background: transparent;
            padding: 0;
        }

        #preview blockquote {
            border-left: 4px solid #dfe2e5;
            padding-left: 16px;
            margin-left: 0;
            margin-bottom: 16px;
            color: #6a737d;
        }

        #preview ul, #preview ol {
            margin-bottom: 16px;
            padding-left: 2em;
        }

        #preview li {
            margin-bottom: 0.25em;
        }

        #preview img {
            max-width: 100%;
            height: auto;
        }

        #preview table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 16px;
        }

        #preview th, #preview td {
            border: 1px solid #dfe2e5;
            padding: 6px 13px;
        }

        #preview th {
            background: #f6f8fa;
            font-weight: 600;
        }

        #preview tr:nth-child(2n) {
            background: #f6f8fa;
        }

        #preview hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background: #e1e4e8;
            border: 0;
        }

        /* 模式切换 */
        .main-container.edit-only .preview-pane {
            display: none;
        }

        .main-container.edit-only .editor-pane {
            border-right: none;
        }

        .main-container.preview-only .editor-pane {
            display: none;
        }

        .main-container.preview-only .preview-pane {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* 底部状态栏 */
        .status-bar {
            background: #2d2d2d;
            color: #999;
            padding: 5px 20px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .status-left, .status-right {
            display: flex;
            gap: 20px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .toolbar {
                display: none;
            }
            
            .main-container {
                flex-direction: column;
            }
            
            .editor-pane {
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }
            
            .main-container.preview-only .preview-pane {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="logo">📝 Markdown 编辑器</span>
            <div class="toolbar">
                <button onclick="undo()" title="撤销 (Ctrl+Z)">↩</button>
                <button onclick="redo()" title="重做 (Ctrl+Y)">↪</button>
                <div class="separator"></div>
                <button onclick="insertText('**', '**')" title="加粗"><i>B</i></button>
                <button onclick="insertText('*', '*')" title="斜体"><i>I</i></button>
                <button onclick="insertText('~~', '~~')" title="删除线">S</button>
                <button onclick="insertText('# ', '')" title="标题">H</button>
                <button onclick="insertText('- ', '')" title="列表">•</button>
                <button onclick="insertText('1. ', '')" title="有序列表">1.</button>
                <button onclick="insertText('> ', '')" title="引用">"</button>
                <button onclick="insertText('```\n', '\n```')" title="代码块">{ }</button>
                <button onclick="insertText('`', '`')" title="行内代码">&lt;&gt;</button>
                <button onclick="insertText('[', '](url)')" title="链接">🔗</button>
                <button onclick="insertText('![alt](', ')')" title="图片">🖼</button>
                <button onclick="insertText('---\n', '')" title="分割线">—</button>
            </div>
        </div>
        <div class="header-right">
            <div class="mode-switch">
                <button onclick="setMode('edit')" id="btn-edit">编辑</button>
                <button onclick="setMode('split')" id="btn-split" class="active">分屏</button>
                <button onclick="setMode('preview')" id="btn-preview">预览</button>
            </div>
            <button class="action-btn" onclick="copyMarkdown()">复制</button>
            <button class="action-btn" onclick="downloadMarkdown()">下载</button>
        </div>
    </div>

    <div class="main-container" id="mainContainer">
        <div class="editor-pane">
            <div class="pane-header">Markdown</div>
            <textarea id="editor" placeholder="在此输入 Markdown 内容...

支持：
# 标题
**加粗** *斜体* ~~删除线~~
- 列表项
1. 有序列表
> 引用
```代码块```
[链接](url) ![图片](url)
--- 分割线"></textarea>
        </div>
        <div class="preview-pane">
            <div class="pane-header">预览</div>
            <div id="preview"></div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <span id="cursorPos">行 1, 列 1</span>
        </div>
        <div class="status-right">
            <span id="charCount">0 字符</span>
            <span id="wordCount">0 词</span>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const mainContainer = document.getElementById('mainContainer');

        // Undo/Redo 历史记录管理
        const history = {
            stack: [],
            index: -1,
            maxSize: 100,
            isUndoing: false,
            lastSaveTime: 0,
            saveDelay: 300
        };

        // 保存当前状态到历史记录
        function saveHistory() {
            if (history.isUndoing) return;
            
            const now = Date.now();
            if (now - history.lastSaveTime < history.saveDelay) return;
            
            const state = {
                content: editor.value,
                cursor: editor.selectionStart,
                timestamp: now
            };
            
            // 如果内容没有变化，不保存
            if (history.index >= 0 && history.stack[history.index].content === state.content) {
                return;
            }
            
            // 删除当前索引之后的历史记录
            history.stack = history.stack.slice(0, history.index + 1);
            
            // 添加新状态
            history.stack.push(state);
            history.index++;
            
            // 限制历史记录大小
            if (history.stack.length > history.maxSize) {
                history.stack.shift();
                history.index--;
            }
            
            history.lastSaveTime = now;
            updateUndoRedoButtons();
        }

        // 撤销
        function undo() {
            if (history.index > 0) {
                history.isUndoing = true;
                history.index--;
                const state = history.stack[history.index];
                editor.value = state.content;
                editor.setSelectionRange(state.cursor, state.cursor);
                updatePreview();
                updateUndoRedoButtons();
                history.isUndoing = false;
            }
        }

        // 重做
        function redo() {
            if (history.index < history.stack.length - 1) {
                history.isUndoing = true;
                history.index++;
                const state = history.stack[history.index];
                editor.value = state.content;
                editor.setSelectionRange(state.cursor, state.cursor);
                updatePreview();
                updateUndoRedoButtons();
                history.isUndoing = false;
            }
        }

        // 更新撤销/重做按钮状态
        function updateUndoRedoButtons() {
            const undoBtn = document.querySelector('button[onclick="undo()"]');
            const redoBtn = document.querySelector('button[onclick="redo()"]');
            
            if (undoBtn) undoBtn.style.opacity = history.index > 0 ? '1' : '0.3';
            if (redoBtn) redoBtn.style.opacity = history.index < history.stack.length - 1 ? '1' : '0.3';
        }

        // 配置 marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // 实时预览
        function updatePreview() {
            const markdown = editor.value;
            preview.innerHTML = marked.parse(markdown);
            updateStatus();
        }

        editor.addEventListener('input', function() {
            updatePreview();
            saveHistory();
        });
        editor.addEventListener('scroll', syncScroll);

        // 键盘快捷键
        editor.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z' && !e.shiftKey) {
                    e.preventDefault();
                    undo();
                } else if ((e.key === 'y') || (e.key === 'z' && e.shiftKey)) {
                    e.preventDefault();
                    redo();
                }
            }
        });

        // 同步滚动
        function syncScroll() {
            const percentage = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
            preview.scrollTop = percentage * (preview.scrollHeight - preview.clientHeight);
        }

        // 插入文本
        function insertText(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selectedText = editor.value.substring(start, end);
            const replacement = before + selectedText + after;
            
            editor.value = editor.value.substring(0, start) + replacement + editor.value.substring(end);
            editor.focus();
            
            const newCursorPos = selectedText ? start + replacement.length : start + before.length;
            editor.setSelectionRange(newCursorPos, newCursorPos);
            updatePreview();
        }

        // 切换模式
        function setMode(mode) {
            mainContainer.className = 'main-container';
            document.querySelectorAll('.mode-switch button').forEach(btn => btn.classList.remove('active'));
            
            switch(mode) {
                case 'edit':
                    mainContainer.classList.add('edit-only');
                    document.getElementById('btn-edit').classList.add('active');
                    break;
                case 'split':
                    document.getElementById('btn-split').classList.add('active');
                    break;
                case 'preview':
                    mainContainer.classList.add('preview-only');
                    document.getElementById('btn-preview').classList.add('active');
                    break;
            }
        }

        // 更新状态栏
        function updateStatus() {
            const text = editor.value;
            const lines = text.substr(0, editor.selectionStart).split('\n');
            const currentLine = lines.length;
            const currentCol = lines[lines.length - 1].length + 1;
            
            document.getElementById('cursorPos').textContent = `行 ${currentLine}, 列 ${currentCol}`;
            document.getElementById('charCount').textContent = `${text.length} 字符`;
            
            // 简单统计词数（中文字符 + 英文单词）
            const chineseChars = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
            const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
            document.getElementById('wordCount').textContent = `${chineseChars + englishWords} 词`;
        }

        editor.addEventListener('keyup', updateStatus);
        editor.addEventListener('click', updateStatus);

        // 复制 Markdown
        function copyMarkdown() {
            editor.select();
            document.execCommand('copy');
            editor.setSelectionRange(editor.selectionStart, editor.selectionStart);
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = originalText, 1500);
        }

        // 下载 Markdown 文件
        function downloadMarkdown() {
            const blob = new Blob([editor.value], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.md';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Tab 键支持
        editor.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
                this.setSelectionRange(start + 4, start + 4);
                updatePreview();
            }
        });

        // 初始化
        saveHistory(); // 保存初始状态
        updatePreview();
        updateUndoRedoButtons();
        editor.focus();
    </script>
</body>
</html>
